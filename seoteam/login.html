<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — Davnoot Writer</title>
<meta name="robots" content="noindex, nofollow, noarchive" />
<link rel="icon" type="image/png" href="/images/Firefly.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/seoteam/app.css" />
</head>
<body class="login-page">
  <main class="login">
    <img class="login-logo" src="/images/Firefly.png" alt="Davnoot" />
    <h1>Writer dashboard</h1>
    <p class="muted">Enter the team password to continue.</p>

    <form id="login-form">
      <label for="password" class="sr-only">Password</label>
      <input id="password" class="input" type="password" placeholder="Password" autocomplete="current-password" required autofocus />
      <button class="btn btn-dark" type="submit" id="submit">Sign in</button>
      <p class="login-error" id="error" hidden></p>
    </form>

    <a class="login-back" href="/">← Back to davnoot.com</a>
  </main>

  <!-- Inline, deliberately: /seoteam/app.js is behind the auth gate, so the login
       page cannot load it. This is the one screen that must work signed out. -->
  <script>
    (function () {
      var form = document.getElementById('login-form');
      var input = document.getElementById('password');
      var error = document.getElementById('error');
      var submit = document.getElementById('submit');

      function fail(message) {
        error.textContent = message;
        error.hidden = false;
        submit.disabled = false;
        submit.textContent = 'Sign in';
        input.select();
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        error.hidden = true;
        submit.disabled = true;
        submit.textContent = 'Signing in…';

        fetch('/api/seoteam/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: input.value }),
          credentials: 'same-origin',
        })
          .then(function (res) {
            return res.json().then(function (data) {
              return { ok: res.ok, data: data };
            });
          })
          .then(function (r) {
            if (!r.ok) return fail(r.data.error || 'Incorrect password.');

            // Return the author to wherever they were headed before the redirect.
            // Only ever a same-site path — never trust `next` as an absolute URL,
            // or the login page becomes an open redirect.
            var next = new URLSearchParams(location.search).get('next');
            var safe = next && next.charAt(0) === '/' && next.charAt(1) !== '/' ? next : '/seoteam';
            location.href = safe;
          })
          .catch(function () {
            fail('Something went wrong. Try again.');
          });
      });
    })();
  </script>
</body>
</html>
