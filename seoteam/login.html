<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — Davnoot Writer</title>
<meta name="robots" content="noindex, nofollow, noarchive" />
<link rel="icon" type="image/png" href="/images/davnoot-logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/seoteam/app.css" />
</head>
<body class="login-page">
  <main class="login">
    <img class="login-logo" src="/images/davnoot-logo.png" alt="Davnoot" />
    <h1>Writer dashboard</h1>
    <p class="muted">Enter the team password to continue.</p>

    <form id="login-form">
      <label for="password" class="sr-only">Password</label>
      <div class="password-field">
        <input id="password" class="input" type="password" placeholder="Password" autocomplete="current-password" required autofocus />
        <button class="password-toggle" type="button" id="password-toggle" aria-label="Show password" aria-pressed="false">
          <svg class="icon-eye" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 12s4-7.5 10.5-7.5S22.5 12 22.5 12s-4 7.5-10.5 7.5S1.5 12 1.5 12z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="icon-eye-off" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" hidden><path d="M3 3l18 18"/><path d="M10.6 5.1A10.9 10.9 0 0 1 12 5c6.5 0 10.5 7 10.5 7a13.6 13.6 0 0 1-3.1 3.9M6.6 6.6C3.4 8.6 1.5 12 1.5 12S5.5 19 12 19a10.6 10.6 0 0 0 5.4-1.5"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/></svg>
        </button>
      </div>
      <button class="btn btn-dark" type="submit" id="submit">Sign in</button>
      <p class="login-error" id="error" hidden></p>
    </form>

    <a class="login-back" href="/">← Back to davnoot.com</a>
  </main>

  <!-- Inline, deliberately: /seoteam/app.js is behind the auth gate, so the login
       page cannot load it. This is the one screen that must work signed out. -->
  <script>
    (function () {
      var form = document.getElementById('login-form');
      var input = document.getElementById('password');
      var error = document.getElementById('error');
      var submit = document.getElementById('submit');
      var toggle = document.getElementById('password-toggle');
      var eyeIcon = toggle.querySelector('.icon-eye');
      var eyeOffIcon = toggle.querySelector('.icon-eye-off');

      toggle.addEventListener('click', function () {
        var showing = input.type === 'text';
        input.type = showing ? 'password' : 'text';
        toggle.setAttribute('aria-pressed', String(!showing));
        toggle.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
        eyeIcon.hidden = !showing;
        eyeOffIcon.hidden = showing;
        input.focus();
      });

      function fail(message) {
        error.textContent = message;
        error.hidden = false;
        submit.disabled = false;
        submit.textContent = 'Sign in';
        input.select();
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        error.hidden = true;
        submit.disabled = true;
        submit.textContent = 'Signing in…';

        fetch('/api/seoteam/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: input.value }),
          credentials: 'same-origin',
        })
          .then(function (res) {
            return res.json().then(function (data) {
              return { ok: res.ok, data: data };
            });
          })
          .then(function (r) {
            if (!r.ok) return fail(r.data.error || 'Incorrect password.');

            // Return the author to wherever they were headed before the redirect.
            // Only ever a same-site path — never trust `next` as an absolute URL,
            // or the login page becomes an open redirect. Must start with a single
            // "/" followed by an alphanumeric: a bare "//host" or "/\host" both
            // normalize to a protocol-relative URL in the browser and would redirect
            // off-site. Reject backslashes, control chars, and any "://" too.
            var next = new URLSearchParams(location.search).get('next');
            var safe = next && /^\/[A-Za-z0-9]/.test(next) && next.indexOf('\\') === -1 &&
              next.indexOf('://') === -1 && !/[\x00-\x1f]/.test(next) ? next : '/seoteam';
            location.href = safe;
          })
          .catch(function () {
            fail('Something went wrong. Try again.');
          });
      });
    })();
  </script>
</body>
</html>
